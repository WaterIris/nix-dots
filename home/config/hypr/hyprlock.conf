# ~/.config/hypr/hyprlock.conf
# Tokyo Night theme, matching the waybar / quickshell setup.

$font = JetBrainsMono Nerd Font Propo

$background   = rgba(1a1b26ee)
$surface      = rgba(16161eee)
$surface-alt  = rgba(292e42ee)
$foreground   = rgb(c0caf5)
$foreground-dim = rgb(a9b1d6)
$subtle       = rgb(565f89)
$blue         = rgb(7aa2f7)
$red          = rgb(f7768e)
$green        = rgb(9ece6a)

general {
    hide_cursor = false
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    color = $background
}

# ===== Clock =====
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $foreground
    font_size = 96
    font_family = $font
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $foreground-dim
    font_size = 20
    font_family = $font
    position = 0, 40
    halign = center
    valign = center
}

# ===== Password input =====
input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    outer_color = $blue
    inner_color = $surface-alt
    font_color = $foreground
    check_color = $green
    fail_color = $red
    fail_text = $FAIL <b>($ATTEMPTS)</b>

    placeholder_text = <i>  Password...</i>
    placeholder_text_color = $subtle

    font_family = $font
    rounding = 14
    position = 0, -100
    halign = center
    valign = center
}

# ===== User label =====
label {
    monitor =
    text = $USER
    color = $foreground-dim
    font_size = 15
    font_family = $font
    position = 0, -50
    halign = center
    valign = center
}
