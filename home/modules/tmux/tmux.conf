# General
set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000    # Increase history size (from 2,000)
set -g mouse on                 # Enable mouse support
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

bind-key -n M-S-t source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind Up
unbind Down
unbind Left
unbind Right

unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

unbind h
unbind j
unbind k
unbind l

bind C-p previous-window
bind C-n next-window

bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

unbind '"'
unbind %

# vim shell navigations and selects in tmux panes

# don't rename windows automatically
set-option -g allow-rename off

backg="#15161e"
frontg="#c0caf5"
over_backg="#1a1b26"
inactive="#545c7e"

red="#f7768e"

yellow="#e0af68"
pine="#7aa2f7"
green="#9ece6a"
mauve="#bb9af7"

# enable vi mode keys
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

set -g status-position bottom
set-option -g status-style bg=${backg}

l_close="#[fg=${over_backg},bg=default]"
r_close="#[fg=${over_backg},bg=default]"
sep="#[fg=${over_backg},bg=default]"
l_sep="#[fg=${over_backg},bg=default]"
r_sep="#[fg=${over_backg},bg=default]"

curr_dir="#{b:pane_current_path}/."

set -g status-left "$l_close#{?client_prefix,#[bg=${over_backg} fg=${mauve}],#[bg=${over_backg} fg=${pine}]}  #S $r_close "
set -g status-right "$l_close#[fg=${green},bg=${over_backg}] 󰃮 %d-%m-%Y $sep#[fg=${pine},bg=${over_backg}] 󱑒 %H:%M $r_close"

set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-separator ""
set -g window-status-format "#[fg=${over_backg},bg=default]#{?window_start_flag,,}#[fg=${inactive},bg=${over_backg}] #I #W #[fg=${over_backg},bg=default]#{?window_end_flag,,}"
set -g window-status-current-format "#[fg=${over_backg},bg=default]#{?window_start_flag,,}#[fg=${pine},bg=${over_backg}] ●#[fg=${yellow},bg=${over_backg}] #W #[fg=${over_backg},bg=default]#{?window_end_flag,,}"

set -g message-command-style bg=default,fg=${frontg}
set -g message-style bg=default,fg=${frontg}
set -g mode-style bg=${over_backg},fg=${yellow}

set -g pane-active-border-style fg=${mauve},bg=default
set -g pane-border-style fg=${inactive},bg=default

set -g default-terminal "tmux-256color"
set-option -g default-shell /home/iris/.nix-profile/bin/zsh

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
