###############################################################
#  Look & feel                                                  #
#  general, decoration, animations, layout, gestures, misc      #
#  https://wiki.hyprland.org/Configuring/Variables/             #
###############################################################

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    # col.inactive_border = rgba(595959aa)

    col.active_border = rgb(191724)
    col.inactive_border = rgb(191724)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    # --- Rounding ---
    rounding = 10
    rounding_power = 2.0

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.0117
        contrast = 0.9
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = pro, 0.05, 0.9, 0.1, 1.0
    bezier = snap, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, snap, popin 80%
    animation = windowsOut, 1, 3, snap, popin 80%
    animation = windowsMove, 1, 3, snap

    animation = layers, 1, 2, pro, slide
    animation = fade, 1, 2, pro

    animation = layersOut, 0, 0,
    animation = border, 1, 3, pro
    animation = workspaces, 1, 3.5, pro, slidefade
}

dwindle {
    preserve_split = true
}


misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1
    disable_hyprland_guiutils_check = false
}

cursor {
    no_hardware_cursors = false
}
