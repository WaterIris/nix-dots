###############################################################
#  Autostart                                                    #
#  Things that should launch when Hyprland starts.              #
#                                                                 #
#  Note: each app gets its own exec-once line rather than        #
#  chaining with `&`. exec-once already runs non-blocking, and   #
#  separate lines let Hyprland track/manage each process          #
#  independently instead of running them as one shell chain.      #
###############################################################

exec-once = dbus-update-activation-environment --systemd --all

exec-once = waybar

# Idle/lock daemon (configure ~/.config/hypr/hypridle.conf separately)
exec-once = hypridle

# Wallpaper daemon (configure ~/.config/hypr/hyprpaper.conf separately)
exec-once = hyprpaper

# Removable media auto-mount/notifications
exec-once = udiskie

# Notification daemon
exec-once = dunst
