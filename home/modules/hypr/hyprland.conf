###############################################################
#  Hyprland main config — entry point                          #
#  Hyprland version target: 0.52.2                              #
#                                                                #
#  This file only sources other files. Edit the modules in      #
#  conf.d/ instead of dumping everything here — it keeps things #
#  easy to find and expand later.                                #
###############################################################

# Order matters a little: monitors/env first, then look & feel,
# then input, then keybinds last (so binds can reference things
# like workspaces already defined).

source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/look-and-feel.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/windowrules.conf

