# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Monononki Nerd Font Bold

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
}

image {
    monitor = 
    path =  ~/.config/hypr/assets/angry-cat-user.png
    halign = center
    valign = center
    position = 0, 90
    rounding = 25
    size = 250
    border_color = rgb(15161e)
}

# USER
label {
    monitor =
    text = Iris
    font_family = $font
    font_size = 30
    position = 0, -85
    halign = center
    valign = center
    color = rgb(545c7e)
}

input-field {
    monitor =
    halign = center
    valign = center
    position = 0, -155
    size = 270, 50
    border_color = rgb(15161e)

    outline_thickness = 2
    # background color
    inner_color = rgb(15161e)
    font_color = rgb(c0caf5)
    # border colors
    # outer_color = rgb(191724)
    # foreground color
    # while waiting for check
    check_color = rgb(bb9af7)
    # check failed
    fail_color = rgb(f7768e)
    fail_text = Wrong password dummy

    fade_on_empty = true
    rounding = 10

    font_family = $font
    placeholder_text =

    # dots_text_format = ★ 
    dots_size = 0.4
    dots_spacing = 0.3
}


# TIME
label {
    monitor =
    text = $TIME
    font_family = $font
    font_size = 90
    position = 0, -30
    halign = right
    valign = top
    color = rgb(545c7e)
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_family = $font
    font_size = 25
    # position = 0, -240
    halign = right
    valign = top
    color = rgb(545c7e)
}
