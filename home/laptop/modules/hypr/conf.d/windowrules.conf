###############################################################
#  Window rules                                                 #
#  https://wiki.hyprland.org/Configuring/Window-Rules/          #
###############################################################

# Layer rules (blur on launcher/notifications etc.)
layerrule = blur, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications

# --- Common floating utilities -----------------------------------
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$

# Picture-in-picture: keep on top, pin to all workspaces
windowrule = pin, title:^(Picture-in-Picture)$

# File picker dialogs
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save File)$
windowrule = float, title:^(Open Folder)$

# --- Opacity tweaks (purely cosmetic, tune to taste) -----------------
windowrule = opacity 0.95 0.85, class:^(kitty)$

# --- Add app-specific rules below as you find apps that misbehave ----
windowrule = workspace 2, class:^(firefox)$
windowrule = workspace 5 silent, class:^(discord)$
